<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>coop</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <span class="mark"></span>
    <b>coop</b><button class="tag folder" id="cwd" title="Working folder — click to change">Cooptimize agent</button>
    <nav class="toolbar">
      <button id="newChat" class="chip" title="Start a fresh conversation">＋ New chat</button>
      <button id="historyBtn" class="chip" title="Resume a previous conversation in this folder">🕘 History</button>
      <button id="modelChip" class="chip" title="Change model">model…</button>
      <button id="thinkChip" class="chip" title="Thinking effort (click to change)">🧠 …</button>
      <button id="compactBtn" class="chip" title="Compact the conversation to free up memory">♻ Compact</button>
      <button id="diffBtn" class="chip" title="File changes in this folder (git)">± Changes</button>
      <button id="filesBtn" class="chip" title="Browse and preview files in the working folder">📁 Files</button>
    </nav>
    <span class="ctxg" id="ctx" hidden>
      <span class="bar"><i id="ctxBar"></i></span>
      <span id="ctxText"></span>
    </span>
    <span class="usage" id="usage" hidden>
      <span class="meter" title=""><span class="bar"><i id="bar5"></i></span><span class="bar"><i id="bar7"></i></span></span>
      <span id="usageText"></span>
    </span>
    <span class="status"><span class="dot" id="dot"></span><span id="statusText">ready</span></span>
  </header>

  <nav id="tabs"></nav>

  <div id="main">
    <div id="scroll"><div id="transcript"></div></div>
    <aside id="files" hidden>
      <div class="files-head">
        <b>📁 Files</b>
        <button id="filesRefresh" class="chip" title="Refresh the file list">⟳</button>
        <button id="filesClose" class="chip" title="Close the panel">✕</button>
      </div>
      <div id="fileTree" class="file-tree"></div>
      <div class="preview-head" id="previewHead" hidden>
        <span id="previewName" title=""></span>
        <label class="attach-lbl" title="When on, coop is told which file you're looking at, so 'this file' just works">
          <input type="checkbox" id="attachChk" checked /> tell coop
        </label>
      </div>
      <div id="preview" class="preview" hidden></div>
    </aside>
    <div id="diff" hidden>
      <div id="diffHead"></div>
      <div id="diffCols">
        <div id="diffFiles"></div>
        <div id="diffBody"></div>
      </div>
    </div>
  </div>
  <div id="toasts"></div>

  <footer>
    <div id="extDock" hidden></div>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Ask coop anything…  (Enter to send, Shift+Enter for a new line)"></textarea>
      <button id="stop" class="stop" hidden>Stop</button>
      <button id="send">Send</button>
    </div>
  </footer>

<script src="/app.js"></script>
<script src="/viewer.js"></script>
<script src="/diff.js"></script>
<script src="/diffview.js"></script>
</body>
</html>
