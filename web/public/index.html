<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>coop</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <span class="mark"></span>
    <b>coop</b><button class="tag folder" id="cwd" title="Working folder — click to change">Cooptimize agent</button>
    <nav class="toolbar">
      <button id="newChat" class="chip" title="Start a fresh conversation">＋ New chat</button>
      <button id="historyBtn" class="chip" title="Resume a previous conversation in this folder">🕘 History</button>
      <button id="modelChip" class="chip" title="Change model">model…</button>
      <button id="thinkChip" class="chip" title="Thinking effort (click to change)">🧠 …</button>
      <button id="compactBtn" class="chip" title="Compact the conversation to free up memory">♻ Compact</button>
    </nav>
    <span class="usage" id="usage" hidden>
      <span class="meter" title=""><span class="bar"><i id="bar5"></i></span><span class="bar"><i id="bar7"></i></span></span>
      <span id="usageText"></span>
    </span>
    <span class="status"><span class="dot" id="dot"></span><span id="statusText">ready</span></span>
  </header>

  <div id="scroll"><div id="transcript"></div></div>
  <div id="toasts"></div>

  <footer>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Ask coop anything…  (Enter to send, Shift+Enter for a new line)"></textarea>
      <button id="stop" class="stop" hidden>Stop</button>
      <button id="send">Send</button>
    </div>
  </footer>

<script src="/app.js"></script>
</body>
</html>
