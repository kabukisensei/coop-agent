name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shell:
    name: shell + config lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n (syntax)
        run: for f in bin/coop lib/common.sh scripts/*.sh tests/*.sh; do echo "checking $f"; bash -n "$f"; done
      - name: shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          shellcheck -S warning -e SC1091 bin/coop lib/common.sh scripts/*.sh tests/*.sh
      - name: python yaml reader
        run: |
          python3 -c "import ast; ast.parse(open('lib/_yaml.py').read())"
          test "$(python3 lib/_yaml.py get .coop/project.yml profile.organization MISS)" = "Cooptimize"
      - name: python extdeps helper
        # NB: this step runs under `bash -e`, so capture the intentionally-nonzero
        # exit codes with `|| rc=$?` (a list context, exempt from set -e) rather than
        # `cmd; test "$?"` — the bare `cmd` would abort the step before the test runs.
        run: |
          python3 -c "import ast; ast.parse(open('lib/_extdeps.py').read())"
          # no extension tree -> exit 2 (nothing to do)
          rc=0; python3 lib/_extdeps.py align /tmp/coop-no-such-dir 0.0.0 --check || rc=$?
          test "$rc" -eq 2
          # bad usage -> exit 3
          rc=0; python3 lib/_extdeps.py 2>/dev/null || rc=$?
          test "$rc" -eq 3
          # write + report on a fixture: overrides written, skew reported (exit 10)
          d="$(mktemp -d)"; mkdir -p "$d/npm/node_modules/@earendil-works/pi-ai" "$d/npm/node_modules/@earendil-works/pi-tui"
          printf '{"version":"0.74.2"}' > "$d/npm/node_modules/@earendil-works/pi-ai/package.json"
          printf '{"version":"0.74.2"}' > "$d/npm/node_modules/@earendil-works/pi-tui/package.json"
          printf '{"name":"pi-extensions","dependencies":{}}' > "$d/npm/package.json"
          rc=0; out="$(python3 lib/_extdeps.py align "$d" 0.80.2)" || rc=$?
          test "$rc" -eq 10
          test "$out" = "0.74.2 0.74.2 0.80.2 0.80.2 1 0"
          python3 -c "import json,sys; o=json.load(open(sys.argv[1]))['overrides']; assert o['@earendil-works/pi-ai']=='0.80.2' and o['@earendil-works/pi-tui']=='0.80.2'" "$d/npm/package.json"
      - name: validate JSON
        run: for f in $(find . -name '*.json' -not -path './node_modules/*' -not -path './.git/*'); do echo "$f"; python3 -m json.tool "$f" >/dev/null; done
      - name: validate YAML
        run: |
          python3 -m pip install --quiet pyyaml
          for f in $(find . -name '*.yml' -not -path './.git/*'); do echo "$f"; python3 -c "import yaml,sys; yaml.safe_load(open(sys.argv[1]))" "$f"; done
      - name: validate skills + prompts
        run: bash scripts/validate-resources.sh

  extensions:
    name: extensions transpile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: esbuild check (mirrors how Pi loads .ts extensions)
        run: |
          for f in extensions/*/index.ts; do
            echo "transpiling $f"
            npx -y esbuild "$f" --bundle --format=esm --platform=node --packages=external --outfile=/dev/null
          done

  tests:
    name: logic tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: run test suite (data-doc config + coop-guardrails enforcement)
        run: bash tests/run.sh

  windows:
    name: powershell parse (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: parse every .ps1 with the PowerShell language parser
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Recurse -Filter *.ps1 |
            Where-Object { $_.FullName -notmatch 'node_modules' } |
            ForEach-Object {
              $errors = $null
              [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$errors) | Out-Null
              if ($errors) {
                Write-Host "PARSE ERRORS in $($_.FullName):"
                $errors | ForEach-Object { Write-Host "  $_" }
                $failed = $true
              } else {
                Write-Host "ok: $($_.FullName)"
              }
            }
          if ($failed) { exit 1 }
