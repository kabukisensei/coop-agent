# coop-agent internal defaults — the single reference for what coop installs and
# wires. Human-readable; the install/update/doctor scripts keep their own copy of
# these lists (bash arrays) in sync with this file. Editing here documents intent;
# edit the matching arrays in scripts/ to change behavior.

agent:
  name: coop
  brand: Cooptimize
  built_on: "@mariozechner/pi-coding-agent"   # Pi — coop is a layer, never a fork

# How coop installs Pi itself.
pi:
  npm_package: "@mariozechner/pi-coding-agent"
  self_update: "pi update pi"
  ext_update: "pi update"

# Pi extensions coop installs (pi install npm:<name>).
pi_extensions:
  core:
    - pi-mcp-adapter        # MCP servers (Fabric / Power BI / Microsoft Learn / context-mode)
    - pi-hermes-memory      # persistent memory + session search + secret scanning
    - pi-better-openai      # plan usage limits (5h / 7d windows) — surfaced in coop's footer
    # NOTE: coop renders its OWN footer + splash via extensions/coop-powerline — it does
    # NOT use a third-party powerline footer (pi-powerline-footer was removed: its welcome
    # overlay couldn't be disabled, Nerd Font glyphs showed as `?`, and it duplicated the
    # bar). coop's footer shows `⬢ Cooptimize · <branch>` on the left and `<model> · ctx N%
    # · tokens · $cost · <plan usage limits>` on the right, in plain text + common Unicode.
    # It surfaces other extensions' status text (e.g. pi-better-openai's plan usage limits /
    # 5h+7d windows) via footerData.getExtensionStatuses(). The splash is the truecolor
    # block-art Cooptimize logo (uniform-padded, width-robust).
  recommended:
    - pi-permissions        # tool-permission gating (reinforces read-only-first)
    - "@aliou/pi-guardrails" # extra guardrails

# coop's own companion extensions (loaded from this repo via `pi -e`).
coop_extensions:
  - extensions/coop-powerline   # splash + footer segments + working vibes
  - extensions/coop-tools       # native LLM tools: sql_review / dax_review / data_doc

# Standalone tools installed via pipx (all on PyPI).
python_tools:
  - coop-data-doc        # SQL + Power BI documentation, lineage, manifest.json
  - coop-sql-review      # advisory T-SQL standards linter (--format json)
  - coop-dax-review      # advisory DAX standards linter (--format json)

# Microsoft Fabric CLI. NOTE: installing this makes `fab` the Microsoft Fabric CLI.
# A Homebrew formula named `fabric` ships a DIFFERENT `fab` (Python SSH automation);
# coop doctor detects the clash (and the Python-Fabric/Paramiko collision) and warns.
# See docs/guardrails.md and README.
fabric_cli:
  pipx_package: ms-fabric-cli
  command: fab
  # fabric-cicd is a Python LIBRARY (no CLI), injected INTO this env via
  # `pipx inject ms-fabric-cli fabric-cicd`, so `fabric_cicd` is importable in the
  # Fabric CLI's environment. Used as `import fabric_cicd` in deployment scripts
  # (validate-only by default), NOT a `fabric-cicd` command. `coop doctor` checks
  # it's importable.
  pipx_inject:
    - fabric-cicd

# Optional, path-configured (mostly Windows). Not auto-installed.
tabular_editor_cli:
  command: TabularEditor.exe
  note: "Set tools.tabular_editor_cli.executable_path in .coop/project.yml"

# MCP servers coop preloads — all read-only, all optional (coop runs without them).
# Placed non-destructively into coop's isolated agent dir (~/.coop/agent/mcp.json)
# by `coop sync` — never touches your personal `pi`'s MCP.
mcp:
  config_example: config/mcp.example.json
  install_target: "~/.coop/agent/mcp.json"
  servers:
    - name: fabric          # @microsoft/fabric-mcp (AzureCliCredential)
      mode: read-only
    - name: powerbi         # powerbi-mcp-server --readonly
      mode: read-only
    - name: microsoft-learn # learn.microsoft.com/api/mcp via mcp-remote (always-current docs)
      mode: read-only
    - name: context-mode    # npx -y context-mode — intent-driven search + sandboxed exec (context savings)
      mode: read-only

# Branded resources loaded at launch (see bin/coop).
resources:
  skills: skills
  prompts: prompts
  theme: themes/cooptimize.json
  guardrails: docs/guardrails.md
  vibes: vibes
  splash: extensions/coop-powerline/assets/splash.ansi

# Tested-with versions (reference). Installs pull the latest unless you pin; doctor
# warns when Pi is older than pi_min (the extension API coop's extensions rely on).
tested_with:
  pi_min: "0.79.0"
  pi: "0.79.4"
  pi_mcp_adapter: "2.10.0"
  pi_hermes_memory: "0.7.17"
  context_mode: "1.0.162"
  ms_fabric_cli: "1.6.1"
  fabric_cicd: "1.1.0"
  coop_data_doc: "0.17.0"
  coop_sql_review: "0.1.0"
  coop_dax_review: "0.1.0"

# Cooptimize brand palette (sampled from the color logo).
brand_colors:
  navy:   "#00416B"
  forest: "#42783C"
  olive:  "#82AA43"
  lime:   "#B2D235"
  red:    "#EF412D"
